services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Taipei
      - WEBUI_PORT=8080
    volumes:
      - ./data/qb-config:/config
      - ./data/downloads:/data/downloads
    ports:
      - "8080:8080"
      - "6881-6891:6881-6891"
      - "6881-6891:6881-6891/udp"

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    network_mode: "service:qbittorrent"
    depends_on:
      - qbittorrent
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
    volumes:
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
      - ./data/downloads:/data/downloads
      - ./data/processing:/data/processing

  bot:
    image: ghcr.io/treehd/telegram2deluge:latest
    restart: unless-stopped
    network_mode: "service:qbittorrent"
    depends_on:
      - qbittorrent
      - telegram-bot-api
    env_file: .env
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/processing:/data/processing
      - ./data/queue:/data/queue
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
