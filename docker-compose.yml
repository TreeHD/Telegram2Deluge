services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - PUID=0
      - PGID=0
      - TZ=Asia/Taipei
      - WEBUI_PORT=8080
    volumes:
      - ./data/qb-config:/config
      - ./data/downloads:/downloads
    ports:
      - "8080:8080"
      - "6891:6891"
      - "6891:6891/udp"

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    network_mode: "service:qbittorrent"
    depends_on:
      - qbittorrent
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
    volumes:
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
      - ./data/downloads:/downloads
      - ./data/processing:/processing

  bot:
    image: ghcr.io/treehd/telegram2deluge:latest
    restart: unless-stopped
    network_mode: "service:qbittorrent"
    depends_on:
      - qbittorrent
      - telegram-bot-api
    env_file: .env
    volumes:
      - ./data/downloads:/downloads
      - ./data/processing:/processing
      - ./data/queue:/data/queue
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
