services:
  deluge:
    image: linuxserver/deluge:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Taipei
      - DELUGE_LOGLEVEL=error
    volumes:
      - ./data/deluge-config:/config
      - ./data/downloads:/data/downloads
    ports:
      - "8112:8112"
      - "6881-6891:6881-6891"
      - "6881-6891:6881-6891/udp"

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    network_mode: "service:deluge"
    depends_on:
      - deluge
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=true
    volumes:
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api

  bot:
    image: ghcr.io/treehd/telegram2deluge:latest
    restart: unless-stopped
    network_mode: "service:deluge"
    depends_on:
      - deluge
      - telegram-bot-api
    env_file: .env
    volumes:
      - ./data/downloads:/data/downloads
      - ./data/processing:/data/processing
      - ./data/queue:/data/queue
